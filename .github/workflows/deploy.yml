name: Deploy to WordPress

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Theme
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # ⚠️ IMPORTANT: Update this path to match your server's theme folder
          # Common paths: /public_html/..., /www/..., or just /
          server-dir: /public_html/wp-content/themes/kidazzle/
          # "loose" security helps with self-signed certificates or shared hosting issues
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .gitignore
            README.md
            *.zip
            .vscode/**
