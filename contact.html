<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - KIDazzle Child Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-ombre-purple {
            background: linear-gradient(135deg, #4c1d95, #7c3aed, #c026d3);
        }
    </style>
</head>

<body class="bg-white text-slate-800">
    <header class="fixed inset-x-0 top-0 bg-white shadow-sm z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div
                    class="h-10 w-10 bg-yellow-400 rounded-full flex items-center justify-center text-white font-bold text-xl">
                    K</div>
                <h1 class="text-3xl font-extrabold tracking-tight">KID<span class="text-yellow-500">azzle</span></h1>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold text-slate-700">
                <a href="index.html" class="hover:text-indigo-600">Home</a>
                <a href="about.html" class="hover:text-orange-500">About Us</a>
                <a href="programs.html" class="hover:text-red-500">Programs</a>
                <a href="locations.html" class="hover:text-green-600">Locations</a>
                <a href="resources.html" class="hover:text-purple-500">Resources</a>
                <a href="contact.html"
                    class="bg-slate-900 text-white px-6 py-2 rounded-xl hover:bg-slate-700 transition-shadow shadow-lg">Contact
                    Us</a>
            </nav>
        </div>
    </header>

    <main class="mt-20">
        <div class="bg-slate-900 py-24 text-white text-center">
            <h1 class="text-5xl font-extrabold mb-4">Contact Us</h1>
            <p class="text-xl text-slate-300">We'd love to hear from you.</p>
        </div>

        <div class="max-w-4xl mx-auto px-6 py-16">
            <div class="grid md:grid-cols-2 gap-12">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900 mb-6">Get in Touch</h2>
                    <ul class="space-y-6 text-lg text-slate-600">
                        <li class="flex items-start gap-4">
                            <i data-lucide="map-pin" class="text-red-500 mt-1"></i>
                            <span>100 Alabama St SW,<br>Atlanta, GA 30303</span>
                        </li>
                        <li class="flex items-center gap-4">
                            <i data-lucide="phone" class="text-green-500"></i>
                            <span class="font-bold">877-410-1002</span>
                        </li>
                        <li class="flex items-center gap-4">
                            <i data-lucide="mail" class="text-cyan-500"></i>
                            <span>info@kidazzle.com</span>
                        </li>
                    </ul>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <form onsubmit="event.preventDefault(); alert('This is a demo form.');">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Name</label>
                                <input type="text"
                                    class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none"
                                    placeholder="Your Name">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                                <input type="email"
                                    class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none"
                                    placeholder="john@example.com">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Message</label>
                                <textarea
                                    class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none h-32"></textarea>
                            </div>
                            <button
                                class="w-full bg-ombre-purple text-white font-bold py-3 rounded-xl hover:opacity-90 transition">Send
                                Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>

</html>
